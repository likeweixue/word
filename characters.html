<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>墨阁·角色设定集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9e3d7;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, sans-serif;
            padding: 24px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
            min-height: 650px;
        }
        .app-header {
            background: #fcf9f2;
            padding: 18px 28px;
            border-bottom: 1px solid #ede3d4;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title-section h1 { font-size: 1.6rem; font-weight: 600; color: #5c3e25; letter-spacing: 2px; }
        .title-section p { font-size: 0.75rem; color: #b48b62; margin-top: 4px; }
        .stats-badge { background: #f3ecdf; border-radius: 40px; padding: 6px 16px; font-size: 0.8rem; color: #9b6e48; }
        .main-dashboard { display: flex; flex: 1; overflow: hidden; }
        .sidebar-tree {
            width: 300px;
            background: #faf6ef;
            border-right: 1px solid #e6ddcf;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 12px 20px 16px;
        }
        .tree-nav { flex: 1; }
        .tree-node { margin-bottom: 4px; user-select: none; }
        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.15s;
            color: #4a3a28;
            font-weight: 500;
        }
        .node-header:hover { background: #efe3d4; }
        .node-header.active { background: #e0d0bd; color: #3a281c; font-weight: 600; }
        .folder-icon, .file-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        .node-title { flex: 1; font-size: 0.9rem; }
        .node-children { margin-left: 28px; padding-left: 6px; border-left: 1px dashed #dcccaa; display: none; }
        .node-children.open { display: block; }
        .add-btn {
            margin: 12px 0 8px 0;
            font-size: 0.7rem;
            background: none;
            border: 1px dashed #c9b692;
            border-radius: 40px;
            padding: 4px 12px;
            color: #9b784e;
            cursor: pointer;
            width: fit-content;
        }
        .editor-area {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 32px;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #f0e5d8;
            padding-bottom: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .editor-title { font-size: 1.6rem; font-weight: 600; color: #4d3520; background: transparent; border: none; padding: 4px 0; width: 70%; font-family: inherit; }
        .editor-title:focus { outline: none; border-bottom: 2px solid #dbbd98; }
        .tool-buttons { display: flex; gap: 12px; }
        .tool-btn { background: #faf3ea; border: 1px solid #e2d3c2; border-radius: 32px; padding: 6px 16px; font-size: 0.75rem; cursor: pointer; color: #6f4f2f; }
        .tool-btn.danger { color: #b15c3a; }
        .tool-btn:hover { background: #eddccb; }
        .char-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            background: #fef7ef;
            padding: 16px 20px;
            border-radius: 28px;
        }
        .char-meta-item { display: flex; align-items: center; gap: 8px; background: white; padding: 4px 16px; border-radius: 40px; border: 1px solid #e8ddcf; }
        .char-meta-item label { font-weight: 500; color: #8b6946; font-size: 0.8rem; }
        .char-meta-item input, .char-meta-item select { border: none; background: transparent; padding: 6px 0; font-family: inherit; font-size: 0.85rem; outline: none; min-width: 100px; }
        .content-textarea { width: 100%; min-height: 350px; border: 1px solid #ede2d4; border-radius: 24px; padding: 20px; font-family: monospace; font-size: 0.95rem; line-height: 1.6; background: #fffdf9; }
        .footer-note { margin-top: 20px; font-size: 0.7rem; text-align: center; color: #c7ad8a; border-top: 1px solid #f1e8dd; padding-top: 16px; }
        @media (max-width: 700px) { .sidebar-tree { width: 240px; } .editor-title { font-size: 1.3rem; width: 100%; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="title-section"><h1>👥 墨阁·角色设定集</h1><p>人物档案 · 关系网 · 成长轨迹</p></div>
        <div class="stats-badge" id="statsBadge">👤 角色总数: 0</div>
    </div>
    <div class="main-dashboard">
        <div class="sidebar-tree">
            <div class="tree-nav" id="treeContainer"></div>
            <div style="padding:8px;"><button id="globalAddGroupBtn" class="add-btn">+ 新增角色分组</button></div>
        </div>
        <div class="editor-area">
            <div class="editor-header">
                <input type="text" id="editorTitle" class="editor-title" placeholder="角色姓名">
                <div class="tool-buttons"><button id="saveBtn" class="tool-btn">💾 保存</button><button id="deleteBtn" class="tool-btn danger">🗑 删除</button></div>
            </div>
            <div class="char-meta">
                <div class="char-meta-item"><label>🏷️ 别号/称号</label><input type="text" id="charAlias" placeholder="例: 青云剑仙"></div>
                <div class="char-meta-item"><label>⚧ 性别</label><select id="charGender"><option>男</option><option>女</option><option>中性</option><option>未知</option></select></div>
                <div class="char-meta-item"><label>🎂 年龄</label><input type="text" id="charAge" placeholder="17岁 / 千年"></div>
                <div class="char-meta-item"><label>🏮 所属势力</label><input type="text" id="charFaction" placeholder="宗门/国家"></div>
            </div>
            <textarea id="editorContent" class="content-textarea" placeholder="角色背景、性格、经历、人际关系、重要事迹……"></textarea>
            <div class="footer-note">✨ 左侧树状分组: 按阵营/种族/势力管理角色</div>
        </div>
    </div>
</div>
<script>
    let charData = { nodes: [] };
    let currentId = null;
    function initDemo() {
        if(charData.nodes.length) return;
        charData.nodes = [
            { id: "grp_main", parentId: null, type: "folder", name: "⭐ 主角阵营", order: 0, groupDesc: "天命所归" },
            { id: "char_ye", parentId: "grp_main", type: "character", name: "叶尘", order: 0, alias: "龙渊君", gender: "男", age: "18", faction: "落星宗", content: "孤儿出身，意外觉醒太古血脉。为人坚毅，重情义，剑术天赋绝伦。与魔族有宿命纠葛。" },
            { id: "char_xue", parentId: "grp_main", type: "character", name: "雪灵儿", order: 1, alias: "冰凰圣女", gender: "女", age: "17", faction: "冰雪宫", content: "表面冷若冰霜，内心善良。身怀冰凤血脉，与叶尘共历患难。" },
            { id: "grp_villain", parentId: null, type: "folder", name: "🌑 对立势力", order: 1, groupDesc: "反派/宿敌" },
            { id: "char_mo", parentId: "grp_villain", type: "character", name: "墨渊", order: 0, alias: "暗夜君主", gender: "男", age: "不详", faction: "魔渊", content: "上古魔尊转世，野心吞噬八荒。智慧深沉，亦正亦邪。" }
        ];
        sortNodes(); renderTree(); setCurrent(charData.nodes.find(n=>n.id==="char_ye")?.id); updateStat();
    }
    function sortNodes() { charData.nodes.sort((a,b)=>(a.order||0)-(b.order||0)); }
    function getChildren(pid) { return charData.nodes.filter(n=>n.parentId===pid).sort((a,b)=>(a.order||0)-(b.order||0)); }
    function renderTree() {
        const container = document.getElementById('treeContainer'); if(!container) return;
        container.innerHTML = '';
        const roots = charData.nodes.filter(n=>n.parentId===null);
        roots.forEach(root=>{ container.appendChild(createNodeElement(root)); });
        updateStat();
    }
    function createNodeElement(node) {
        const div = document.createElement('div'); div.className='tree-node'; div.dataset.id=node.id;
        const header = document.createElement('div'); header.className='node-header';
        if(currentId===node.id) header.classList.add('active');
        const icon = document.createElement('span'); icon.className='folder-icon';
        icon.innerText = node.type==='folder'?'📁':'👤';
        const titleSpan = document.createElement('span'); titleSpan.className='node-title'; titleSpan.innerText=node.name;
        header.appendChild(icon); header.appendChild(titleSpan);
        if(node.type==='folder'){
            const addBtn = document.createElement('span'); addBtn.innerText=' + '; addBtn.style.cursor='pointer'; addBtn.style.marginLeft='auto';
            addBtn.addEventListener('click',(e)=>{ e.stopPropagation(); addCharacterToGroup(node.id, node.name); });
            header.appendChild(addBtn);
        }
        header.addEventListener('click',()=>setCurrent(node.id));
        div.appendChild(header);
        const childrenDiv = document.createElement('div'); childrenDiv.className='node-children open';
        const children = getChildren(node.id);
        children.forEach(ch=>{ childrenDiv.appendChild(createNodeElement(ch)); });
        if(children.length===0 && node.type==='folder'){ let hint=document.createElement('div'); hint.style.cssText='font-size:0.7rem;color:#b29a78;padding:4px 0 8px 28px'; hint.innerText='暂无角色，点击“+”添加'; childrenDiv.appendChild(hint); }
        div.appendChild(childrenDiv);
        return div;
    }
    function addCharacterToGroup(groupId, groupName) {
        let name = prompt(`在「${groupName}」下新增角色姓名:`, "新角色");
        if(!name) return;
        let children = getChildren(groupId);
        let newId = `char_${Date.now()}_${Math.random()}`;
        charData.nodes.push({ id: newId, parentId: groupId, type: "character", name: name, order: children.length, alias: "", gender: "男", age: "", faction: "", content: "" });
        sortNodes(); renderTree(); setCurrent(newId);
    }
    function setCurrent(id) {
        currentId = id;
        const node = charData.nodes.find(n=>n.id===id);
        if(node && node.type==='character'){
            document.getElementById('editorTitle').value = node.name||'';
            document.getElementById('charAlias').value = node.alias||'';
            document.getElementById('charGender').value = node.gender||'男';
            document.getElementById('charAge').value = node.age||'';
            document.getElementById('charFaction').value = node.faction||'';
            document.getElementById('editorContent').value = node.content||'';
            document.querySelector('.char-meta').style.display = 'flex';
        } else if(node && node.type==='folder'){
            document.getElementById('editorTitle').value = node.name||'分组';
            document.getElementById('charAlias').value = '';
            document.getElementById('charGender').value = '男';
            document.getElementById('charAge').value = '';
            document.getElementById('charFaction').value = '';
            document.getElementById('editorContent').value = node.groupDesc||'角色分组说明';
            document.querySelector('.char-meta').style.display = 'none';
        } else { document.getElementById('editorTitle').value=''; document.getElementById('editorContent').value=''; }
        renderTree();
    }
    function saveCurrent(){
        if(!currentId) return;
        let node = charData.nodes.find(n=>n.id===currentId);
        if(node){
            node.name = document.getElementById('editorTitle').value;
            if(node.type==='character'){
                node.alias = document.getElementById('charAlias').value;
                node.gender = document.getElementById('charGender').value;
                node.age = document.getElementById('charAge').value;
                node.faction = document.getElementById('charFaction').value;
                node.content = document.getElementById('editorContent').value;
            } else {
                node.groupDesc = document.getElementById('editorContent').value;
            }
            renderTree(); alert('保存成功');
        }
    }
    function deleteCurrent(){
        if(!currentId) return;
        if(confirm('删除此项及其下所有角色？')) {
            const toDelete = [currentId];
            const collect=(pid)=>{ charData.nodes.filter(n=>n.parentId===pid).forEach(ch=>{ toDelete.push(ch.id); collect(ch.id); }); };
            collect(currentId);
            charData.nodes = charData.nodes.filter(n=>!toDelete.includes(n.id));
            if(charData.nodes.length) setCurrent(charData.nodes[0].id);
            else renderTree();
        }
    }
    function globalAddGroup(){
        let groupName = prompt("输入新分组名称(如: 仙门长老)", "新阵营");
        if(!groupName) return;
        let newId = `grp_${Date.now()}`;
        charData.nodes.push({ id: newId, parentId: null, type: "folder", name: groupName, order: charData.nodes.filter(n=>!n.parentId).length, groupDesc: "" });
        sortNodes(); renderTree(); setCurrent(newId);
    }
    function updateStat(){ document.getElementById('statsBadge').innerHTML = `👤 角色总数: ${charData.nodes.filter(n=>n.type==='character').length}`; }
    function saveToLocal(){ localStorage.setItem('character_manager', JSON.stringify(charData.nodes)); alert('角色集已保存'); }
    function loadLocal(){ let raw = localStorage.getItem('character_manager'); if(raw){ charData.nodes = JSON.parse(raw); sortNodes(); renderTree(); setCurrent(charData.nodes.find(n=>n.type==='character')?.id); } else initDemo(); }
    document.getElementById('saveBtn').addEventListener('click',saveCurrent);
    document.getElementById('deleteBtn').addEventListener('click',deleteCurrent);
    document.getElementById('globalAddGroupBtn').addEventListener('click',globalAddGroup);
    let saveAll=document.createElement('button'); saveAll.innerText='💾 存档至本地'; saveAll.className='tool-btn'; saveAll.style.position='fixed'; saveAll.style.bottom='24px'; saveAll.style.right='32px'; saveAll.style.zIndex='100'; saveAll.addEventListener('click',saveToLocal); document.body.appendChild(saveAll);
    loadLocal();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>世界观设定</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9e3d7;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, sans-serif;
            padding: 24px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
            min-height: 650px;
        }
        .app-header {
            background: #fcf9f2;
            padding: 18px 28px;
            border-bottom: 1px solid #ede3d4;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title-section h1 { font-size: 1.6rem; font-weight: 600; color: #5c3e25; letter-spacing: 2px; }
        .title-section p { font-size: 0.75rem; color: #b48b62; margin-top: 4px; }
        .stats-badge { background: #f3ecdf; border-radius: 40px; padding: 6px 16px; font-size: 0.8rem; color: #9b6e48; }
        .main-dashboard { display: flex; flex: 1; overflow: hidden; }
        .sidebar-tree {
            width: 300px;
            background: #faf6ef;
            border-right: 1px solid #e6ddcf;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 12px 20px 16px;
        }
        .tree-nav { flex: 1; }
        .tree-node { margin-bottom: 4px; user-select: none; }
        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.15s;
            color: #4a3a28;
            font-weight: 500;
        }
        .node-header:hover { background: #efe3d4; }
        .node-header.active { background: #e0d0bd; color: #3a281c; font-weight: 600; }
        .folder-icon, .file-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        .node-title { flex: 1; font-size: 0.9rem; }
        .node-children { margin-left: 28px; padding-left: 6px; border-left: 1px dashed #dcccaa; display: none; }
        .node-children.open { display: block; }
        .add-btn {
            margin: 12px 0 8px 0;
            font-size: 0.7rem;
            background: none;
            border: 1px dashed #c9b692;
            border-radius: 40px;
            padding: 4px 12px;
            color: #9b784e;
            cursor: pointer;
            width: fit-content;
        }
        .editor-area {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 32px;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #f0e5d8;
            padding-bottom: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .editor-title { font-size: 1.6rem; font-weight: 600; color: #4d3520; background: transparent; border: none; padding: 4px 0; width: 70%; font-family: inherit; }
        .editor-title:focus { outline: none; border-bottom: 2px solid #dbbd98; }
        .tool-buttons { display: flex; gap: 12px; }
        .tool-btn { background: #faf3ea; border: 1px solid #e2d3c2; border-radius: 32px; padding: 6px 16px; font-size: 0.75rem; cursor: pointer; color: #6f4f2f; }
        .tool-btn.danger { color: #b15c3a; }
        .tool-btn:hover { background: #eddccb; }
        .world-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            background: #fef7ef;
            padding: 16px 20px;
            border-radius: 28px;
        }
        .world-meta-item { display: flex; align-items: center; gap: 8px; background: white; padding: 4px 16px; border-radius: 40px; border: 1px solid #e8ddcf; }
        .world-meta-item label { font-weight: 500; color: #8b6946; font-size: 0.8rem; }
        .world-meta-item input { border: none; background: transparent; padding: 6px 0; font-family: inherit; font-size: 0.85rem; outline: none; width: 150px; }
        .content-textarea { width: 100%; min-height: 400px; border: 1px solid #ede2d4; border-radius: 24px; padding: 20px; font-family: monospace; font-size: 0.95rem; line-height: 1.6; background: #fffdf9; }
        .footer-note { margin-top: 20px; font-size: 0.7rem; text-align: center; color: #c7ad8a; border-top: 1px solid #f1e8dd; padding-top: 16px; }
        @media (max-width: 700px) { .sidebar-tree { width: 240px; } .editor-title { font-size: 1.3rem; width: 100%; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="title-section"><h1>🌍 写作帮手-世界观设定</h1><p>天地法则 · 势力图谱 · 奇观异闻</p></div>
        <div class="stats-badge" id="statsBadge">📖 条目总数: 0</div>
    </div>
    <div class="main-dashboard">
        <div class="sidebar-tree">
            <div class="tree-nav" id="treeContainer"></div>
            <div style="padding:8px;"><button id="globalAddGroupBtn" class="add-btn">+ 新增设定分类</button></div>
        </div>
        <div class="editor-area">
            <div class="editor-header">
                <input type="text" id="editorTitle" class="editor-title" placeholder="设定名称">
                <div class="tool-buttons"><button id="saveBtn" class="tool-btn">💾 保存</button><button id="deleteBtn" class="tool-btn danger">🗑 删除</button></div>
            </div>
            <div class="world-meta">
                <div class="world-meta-item"><label>🏷️ 别称/别名</label><input type="text" id="worldAlias" placeholder="例如: 九州大陆"></div>
                <div class="world-meta-item"><label>⚡ 力量体系</label><input type="text" id="worldPower" placeholder="灵气/魔法/武道"></div>
                <div class="world-meta-item"><label>📅 时代背景</label><input type="text" id="worldEra" placeholder="上古/中古/近世"></div>
            </div>
            <textarea id="editorContent" class="content-textarea" placeholder="详细描述地理位置、历史演变、种族分布、特殊法则、势力介绍……"></textarea>
            <div class="footer-note">✨ 左侧树状结构: 按地理区域/力量体系/历史纪元管理世界观</div>
        </div>
    </div>
</div>
<script>
    let worldData = { nodes: [] };
    let currentId = null;
    function initDemo() {
        if(worldData.nodes.length) return;
        worldData.nodes = [
            { id: "geo_root", parentId: null, type: "folder", name: "🗺️ 地理志", order: 0, desc: "大陆版块与秘境分布" },
            { id: "geo_zhongzhou", parentId: "geo_root", type: "setting", name: "中州大陆", order: 0, alias: "中央沃土", powerSys: "灵气", era: "繁荣纪", content: "人族主要聚居地，王朝林立，修仙宗门鼎盛。灵脉充沛。" },
            { id: "geo_nanjiang", parentId: "geo_root", type: "setting", name: "南疆十万大山", order: 1, alias: "蛮荒禁地", powerSys: "巫蛊", era: "古老", content: "妖兽横行，巫族后裔隐匿，遍布上古遗迹。" },
            { id: "power_root", parentId: null, type: "folder", name: "⚙️ 力量体系", order: 1, desc: "修炼法则与特殊能力" },
            { id: "power_xiu", parentId: "power_root", type: "setting", name: "五行灵气", order: 0, alias: "修真根基", powerSys: "五行相生", era: "通用", content: "天地灵气分金木水火土，修士引气入体，淬炼神魂。" },
            { id: "power_shen", parentId: "power_root", type: "setting", name: "血脉觉醒", order: 1, alias: "远古传承", powerSys: "血脉神通", era: "太古遗留", content: "部分后人觉醒上古神魔血脉，获得逆天战力，亦有代价。" },
            { id: "history_root", parentId: null, type: "folder", name: "📜 历史纪年", order: 2, desc: "大事记与文明更迭" },
            { id: "his_ancient", parentId: "history_root", type: "setting", name: "太古神话时代", order: 0, alias: "神魔纪元", powerSys: "神力", era: "太古", content: "神魔争霸，天地碎裂，遗留无数秘境与神器。" }
        ];
        sortNodes(); renderTree(); setCurrent(worldData.nodes.find(n=>n.id==="geo_zhongzhou")?.id); updateStat();
    }
    function sortNodes() { worldData.nodes.sort((a,b)=>(a.order||0)-(b.order||0)); }
    function getChildren(pid) { return worldData.nodes.filter(n=>n.parentId===pid).sort((a,b)=>(a.order||0)-(b.order||0)); }
    function renderTree() {
        const container = document.getElementById('treeContainer'); if(!container) return;
        container.innerHTML = '';
        const roots = worldData.nodes.filter(n=>n.parentId===null);
        roots.forEach(root=>{ container.appendChild(createNodeElement(root)); });
        updateStat();
    }
    function createNodeElement(node) {
        const div = document.createElement('div'); div.className='tree-node'; div.dataset.id=node.id;
        const header = document.createElement('div'); header.className='node-header';
        if(currentId===node.id) header.classList.add('active');
        const icon = document.createElement('span'); icon.className='folder-icon';
        icon.innerText = node.type==='folder'?'📁':'📄';
        const titleSpan = document.createElement('span'); titleSpan.className='node-title'; titleSpan.innerText=node.name;
        header.appendChild(icon); header.appendChild(titleSpan);
        if(node.type==='folder'){
            const addBtn = document.createElement('span'); addBtn.innerText=' + '; addBtn.style.cursor='pointer'; addBtn.style.marginLeft='auto';
            addBtn.addEventListener('click',(e)=>{ e.stopPropagation(); addSettingToGroup(node.id, node.name); });
            header.appendChild(addBtn);
        }
        header.addEventListener('click',()=>setCurrent(node.id));
        div.appendChild(header);
        const childrenDiv = document.createElement('div'); childrenDiv.className='node-children open';
        const children = getChildren(node.id);
        children.forEach(ch=>{ childrenDiv.appendChild(createNodeElement(ch)); });
        if(children.length===0 && node.type==='folder'){ let hint=document.createElement('div'); hint.style.cssText='font-size:0.7rem;color:#b29a78;padding:4px 0 8px 28px'; hint.innerText='暂无条目，点击“+”添加'; childrenDiv.appendChild(hint); }
        div.appendChild(childrenDiv);
        return div;
    }
    function addSettingToGroup(groupId, groupName) {
        let name = prompt(`在「${groupName}」下新增设定条目名称:`, "新设定");
        if(!name) return;
        let children = getChildren(groupId);
        let newId = `set_${Date.now()}_${Math.random()}`;
        worldData.nodes.push({ id: newId, parentId: groupId, type: "setting", name: name, order: children.length, alias: "", powerSys: "", era: "", content: "" });
        sortNodes(); renderTree(); setCurrent(newId);
    }
    function setCurrent(id) {
        currentId = id;
        const node = worldData.nodes.find(n=>n.id===id);
        if(node && node.type==='setting'){
            document.getElementById('editorTitle').value = node.name||'';
            document.getElementById('worldAlias').value = node.alias||'';
            document.getElementById('worldPower').value = node.powerSys||'';
            document.getElementById('worldEra').value = node.era||'';
            document.getElementById('editorContent').value = node.content||'';
            document.querySelector('.world-meta').style.display = 'flex';
        } else if(node && node.type==='folder'){
            document.getElementById('editorTitle').value = node.name||'分组';
            document.getElementById('worldAlias').value = '';
            document.getElementById('worldPower').value = '';
            document.getElementById('worldEra').value = '';
            document.getElementById('editorContent').value = node.desc||'分类描述';
            document.querySelector('.world-meta').style.display = 'none';
        } else { document.getElementById('editorTitle').value=''; document.getElementById('editorContent').value=''; }
        renderTree();
    }
    function saveCurrent(){
        if(!currentId) return;
        let node = worldData.nodes.find(n=>n.id===currentId);
        if(node){
            node.name = document.getElementById('editorTitle').value;
            if(node.type==='setting'){
                node.alias = document.getElementById('worldAlias').value;
                node.powerSys = document.getElementById('worldPower').value;
                node.era = document.getElementById('worldEra').value;
                node.content = document.getElementById('editorContent').value;
            } else {
                node.desc = document.getElementById('editorContent').value;
            }
            renderTree(); alert('世界观已保存');
        }
    }
    function deleteCurrent(){
        if(!currentId) return;
        if(confirm('删除此项及其子设定？')) {
            const toDelete = [currentId];
            const collect=(pid)=>{ worldData.nodes.filter(n=>n.parentId===pid).forEach(ch=>{ toDelete.push(ch.id); collect(ch.id); }); };
            collect(currentId);
            worldData.nodes = worldData.nodes.filter(n=>!toDelete.includes(n.id));
            if(worldData.nodes.length) setCurrent(worldData.nodes[0].id);
            else renderTree();
        }
    }
    function globalAddGroup(){
        let groupName = prompt("输入新分类名称(如: 种族卷)", "新分类");
        if(!groupName) return;
        let newId = `grp_${Date.now()}`;
        worldData.nodes.push({ id: newId, parentId: null, type: "folder", name: groupName, order: worldData.nodes.filter(n=>!n.parentId).length, desc: "" });
        sortNodes(); renderTree(); setCurrent(newId);
    }
    function updateStat(){ document.getElementById('statsBadge').innerHTML = `📖 条目总数: ${worldData.nodes.filter(n=>n.type==='setting').length}`; }
    function saveToLocal(){ localStorage.setItem('world_manager', JSON.stringify(worldData.nodes)); alert('世界观已本地保存'); }
    function loadLocal(){ let raw = localStorage.getItem('world_manager'); if(raw){ worldData.nodes = JSON.parse(raw); sortNodes(); renderTree(); setCurrent(worldData.nodes.find(n=>n.type==='setting')?.id); } else initDemo(); }
    document.getElementById('saveBtn').addEventListener('click',saveCurrent);
    document.getElementById('deleteBtn').addEventListener('click',deleteCurrent);
    document.getElementById('globalAddGroupBtn').addEventListener('click',globalAddGroup);
    let saveAll=document.createElement('button'); saveAll.innerText='💾 存档至本地'; saveAll.className='tool-btn'; saveAll.style.position='fixed'; saveAll.style.bottom='24px'; saveAll.style.right='32px'; saveAll.style.zIndex='100'; saveAll.addEventListener('click',saveToLocal); document.body.appendChild(saveAll);
    loadLocal();
</script>
</body>
</html>

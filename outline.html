<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小说大纲管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #dfd5bc;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px;
            min-height: 100vh;
        }

        /* 主容器 — 沿袭原风格，米白基调+精致阴影 */
        .outliner-app {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
            min-height: 650px;
        }

        /* 头部装饰 */
        .app-header {
            background: #fcf9f2;
            padding: 18px 28px;
            border-bottom: 1px solid #ede3d4;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title-section h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #5c3e25;
            letter-spacing: 2px;
        }
        .title-section p {
            font-size: 0.75rem;
            color: #b48b62;
            margin-top: 4px;
        }
        .stats-badge {
            background: #f3ecdf;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            color: #9b6e48;
        }

        /* 左右核心布局 */
        .main-dashboard {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========= 左侧文件夹树 ========= */
        .sidebar-tree {
            width: 280px;
            background: #faf6ef;
            border-right: 1px solid #e6ddcf;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 12px 20px 16px;
        }

        .tree-nav {
            flex: 1;
        }

        .tree-node {
            margin-bottom: 4px;
            user-select: none;
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s;
            color: #4a3a28;
            font-weight: 500;
        }

        .node-header:hover {
            background: #efe3d4;
        }

        .node-header.active {
            background: #e0d0bd;
            color: #3a281c;
            font-weight: 600;
        }

        .folder-icon, .file-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .node-title {
            flex: 1;
            font-size: 0.9rem;
        }

        .node-children {
            margin-left: 28px;
            padding-left: 6px;
            border-left: 1px dashed #dcccaa;
            display: none;
        }

        .node-children.open {
            display: block;
        }

        /* 章节目录样式 */
        .chapter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px 6px 12px;
            margin: 4px 0;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #5e4a34;
        }
        .chapter-item:hover {
            background: #e9dfd1;
        }
        .chapter-item.active {
            background: #e0cfbb;
            color: #392c1e;
            font-weight: 500;
        }

        .add-chapter-btn {
            margin: 12px 0 8px 28px;
            font-size: 0.7rem;
            background: none;
            border: 1px dashed #c9b692;
            border-radius: 40px;
            padding: 4px 12px;
            color: #9b784e;
            cursor: pointer;
            width: fit-content;
            transition: 0.1s;
        }
        .add-chapter-btn:hover {
            background: #e2d3c1;
        }

        /* 右侧编辑区域 */
        .editor-area {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 32px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #f0e5d8;
            padding-bottom: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .editor-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #4d3520;
            letter-spacing: 1px;
            background: transparent;
            border: none;
            padding: 4px 0;
            width: 70%;
            font-family: inherit;
        }
        .editor-title:focus {
            outline: none;
            border-bottom: 2px solid #dbbd98;
        }
        .tool-buttons {
            display: flex;
            gap: 12px;
        }
        .tool-btn {
            background: #faf3ea;
            border: 1px solid #e2d3c2;
            border-radius: 32px;
            padding: 6px 16px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
            color: #6f4f2f;
        }
        .tool-btn.danger {
            color: #b15c3a;
        }
        .tool-btn:hover {
            background: #eddccb;
        }

        .editor-content {
            flex: 1;
        }
        .content-textarea {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: 1px solid #ede2d4;
            border-radius: 24px;
            padding: 20px;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            background: #fffdf9;
            color: #2f241b;
        }
        .content-textarea:focus {
            outline: none;
            border-color: #cfb690;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            text-align: center;
            color: #c7ad8a;
            border-top: 1px solid #f1e8dd;
            padding-top: 16px;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .sidebar-tree { width: 240px; }
            .editor-title { font-size: 1.3rem; width: 100%; margin-bottom: 12px; }
        }
    </style>
</head>
<body>
<div class="outliner-app">
    <div class="app-header">
        <div class="title-section">
            <h1>📖 写作帮手-大纲面板</h1>
            <p>总纲 · 卷章 · 灵思架构</p>
        </div>
        <div class="stats-badge" id="statsBadge">📚 卷章总数: 0</div>
    </div>
    <div class="main-dashboard">
        <!-- 左侧文件夹风格树 -->
        <div class="sidebar-tree">
            <div class="tree-nav" id="treeContainer">
                <!-- 动态渲染树形结构 -->
            </div>
            <div style="margin-top: 20px; padding: 8px;">
                <button id="globalAddChapterBtn" class="add-chapter-btn" style="margin-left:0;">+ 快速新建章纲</button>
            </div>
        </div>

        <!-- 右侧编辑区域 -->
        <div class="editor-area">
            <div class="editor-header">
                <input type="text" id="editorTitleInput" class="editor-title" placeholder="大纲/章节标题" value="未命名">
                <div class="tool-buttons">
                    <button id="saveCurrentBtn" class="tool-btn">💾 保存</button>
                    <button id="deleteCurrentBtn" class="tool-btn danger">🗑 删除</button>
                </div>
            </div>
            <div class="editor-content">
                <textarea id="editorContentArea" class="content-textarea" placeholder="在此撰写总纲、章纲内容……\n支持详细的情节设计、人物关系、伏笔设定等。"></textarea>
            </div>
            <div class="footer-note">
                ✨ 左侧文件夹结构：总纲 · 卷/章纲 —— 可任意增删章节，大纲自动保存至浏览器本地
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 小说大纲数据结构 ----------
    // 根级文件夹: 总纲、章纲(卷/章) 按照层级实现: 总纲为单独一个，卷/章纲可包含子章节。
    // 为符合"总纲，章纲"风格，我们设定左侧树为:
    // - 📌 总纲 (单独一个节点，不可删除但可编辑)
    // - 📂 卷章集 (可包含多个卷/章，每个卷下可再细分子纲)
    //    - 第一卷 风云初动
    //       - 第一章 启程
    //       - 第二章 暗流
    //    - 第二卷 剑指苍穹 ...
    // 用户可增加卷/章，任意层级(最多3层便于体验)
    
    let outlineData = {
        // 唯一ID映射
        nodes: [
            { id: "outline_root", parentId: null, type: "folder", name: "总纲", order: 0, isMainOutline: true, content: "这里是小说总纲，设定世界观、主线、核心冲突、结局方向……" },
            { id: "volumes_root", parentId: null, type: "folder", name: "📚 卷章集", order: 1, isMainOutline: false, content: "卷章总览区" }
        ],
        // 额外子节点: 第一卷范例, 第一章等
        // 预置示例数据让用户直观感受
    };
    let nextId = 100;

    // 初始化一些示例章纲
    const demoChapters = [
        { id: "ch1", parentId: "volumes_root", type: "chapter", name: "第一卷·龙渊觉醒", order: 0, content: "天地异变，主角获得神秘力量，少年踏上征途。详细大纲：1. 山村遇袭 2. 古剑认主 3. 拜别故乡" },
        { id: "ch2", parentId: "ch1", type: "chapter", name: "第一章 少年行", order: 0, content: "具体章纲：叶尘在山崖发现青铜古剑，剑灵现身，教导基础心法。遭遇山匪，意外觉醒血脉。" },
        { id: "ch3", parentId: "ch1", type: "chapter", name: "第二章 落星试炼", order: 1, content: "进入落星宗参加入门考核，结识同伴，初露锋芒。敌对势力暗中窥探。" },
        { id: "ch4", parentId: "volumes_root", type: "chapter", name: "第二卷·风起云涌", order: 1, content: "宗门大比，各方势力角逐，主角逐渐揭开上古隐秘。卷纲: 1. 内门之争 2. 秘境夺宝 3. 师徒反目" },
        { id: "ch5", parentId: "ch4", type: "chapter", name: "第三章 秘境迷踪", order: 0, content: "章节细纲：主角与小队进入荒古秘境，遇上远古凶兽，获得传承，但也埋下诅咒。" },
    ];

    // 初始化加载demo数据及主节点
    function initData() {
        // 清除已有的预置demo如果重复
        if(outlineData.nodes.find(n => n.id === "ch1")) return;
        outlineData.nodes.push(...demoChapters);
        // 确保总纲内容和卷章集存在
        if(!outlineData.nodes.find(n => n.id === "outline_root")) {
            outlineData.nodes.push({ id: "outline_root", parentId: null, type: "folder", name: "总纲", order: 0, isMainOutline: true, content: "小说总纲：世界观设定、主线脉络、人物图谱……" });
        }
        if(!outlineData.nodes.find(n => n.id === "volumes_root")) {
            outlineData.nodes.push({ id: "volumes_root", parentId: null, type: "folder", name: "📚 卷章集", order: 1, isMainOutline: false, content: "卷章总览" });
        }
        // 如果没有children顺序维持，重新排序order
        sortNodesByOrder();
    }

    function sortNodesByOrder() {
        outlineData.nodes.sort((a,b) => (a.order || 0) - (b.order || 0));
    }

    // 获取子节点
    function getChildren(parentId) {
        return outlineData.nodes.filter(n => n.parentId === parentId).sort((a,b) => (a.order || 0) - (b.order || 0));
    }

    // 当前选中的节点ID
    let currentSelectedId = "outline_root";

    // 渲染左侧树 (递归)
    function renderTree() {
        const container = document.getElementById('treeContainer');
        if(!container) return;
        container.innerHTML = '';
        // 根节点: parentId为null的两个节点 (总纲 和 卷章集)
        const rootNodes = outlineData.nodes.filter(n => n.parentId === null).sort((a,b) => a.order - b.order);
        rootNodes.forEach(root => {
            const treeNode = createTreeNode(root, 0);
            container.appendChild(treeNode);
        });
        // 更新统计卷章数
        const allChapters = outlineData.nodes.filter(n => n.type === 'chapter');
        document.getElementById('statsBadge').innerHTML = `📚 卷章总数: ${allChapters.length}`;
    }

    function createTreeNode(node, depthLevel) {
        const wrapper = document.createElement('div');
        wrapper.className = 'tree-node';
        wrapper.dataset.id = node.id;
        
        const header = document.createElement('div');
        header.className = 'node-header';
        if(currentSelectedId === node.id) header.classList.add('active');
        
        // 图标区分
        const iconSpan = document.createElement('span');
        iconSpan.className = 'folder-icon';
        if(node.type === 'folder') {
            iconSpan.innerText = node.id === 'outline_root' ? '📜' : '📂';
        } else {
            iconSpan.innerText = '📄';
        }
        
        const titleSpan = document.createElement('span');
        titleSpan.className = 'node-title';
        titleSpan.innerText = node.name;
        
        // 新增按钮组之类的？ 为每个非总纲的文件夹或卷章集旁边增加添加章节按钮（简易）,但为了整洁下边统一提供添加按钮，且右键菜单太复杂，提供卷章集内的添加按钮
        header.appendChild(iconSpan);
        header.appendChild(titleSpan);
        
        // 为卷章集根节点或文件夹添加一个小加号 (方便添加卷/章)
        if((node.type === 'folder' && node.id !== 'outline_root') || node.id === 'volumes_root') {
            const addBtn = document.createElement('span');
            addBtn.innerText = ' + ';
            addBtn.style.fontSize = '1.2rem';
            addBtn.style.cursor = 'pointer';
            addBtn.style.marginLeft = 'auto';
            addBtn.style.opacity = '0.7';
            addBtn.title = '在此目录下新增章纲/卷';
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                promptAddChild(node.id, node.name);
            });
            header.appendChild(addBtn);
        }
        
        header.addEventListener('click', (e) => {
            if(e.target === addBtn) return;
            setCurrentSelected(node.id);
        });
        
        wrapper.appendChild(header);
        
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'node-children';
        const children = getChildren(node.id);
        if(children.length > 0) {
            childrenContainer.classList.add('open'); // 默认展开方便查看
            children.forEach(child => {
                const childNode = createTreeNode(child, depthLevel+1);
                childrenContainer.appendChild(childNode);
            });
        } else {
            // 空目录占位符，显示空行但也可以保留按钮
            if(node.type === 'folder' && node.id !== 'outline_root') {
                const emptyHint = document.createElement('div');
                emptyHint.style.fontSize = '0.7rem';
                emptyHint.style.color = '#b29a78';
                emptyHint.style.padding = '4px 0 8px 28px';
                emptyHint.innerText = '暂无章节，点击“+”添加';
                childrenContainer.appendChild(emptyHint);
            }
        }
        wrapper.appendChild(childrenContainer);
        
        return wrapper;
    }
    
    // 新增子节点 (章或者卷)
    function promptAddChild(parentId, parentName) {
        const typeChoice = confirm(`在「${parentName}」下新增: 按“确定”添加章纲(子章节)，按“取消”添加卷/文件夹`);
        let nodeType = typeChoice ? 'chapter' : 'folder';
        let defaultName = nodeType === 'chapter' ? '新章纲' : '新卷';
        let newNodeName = prompt(`请输入${nodeType === 'chapter' ? '章纲' : '卷/文件夹'}名称:`, defaultName);
        if(!newNodeName) return;
        const existingChildren = getChildren(parentId);
        const newOrder = existingChildren.length;
        const newId = `node_${Date.now()}_${Math.floor(Math.random()*10000)}`;
        const newNode = {
            id: newId,
            parentId: parentId,
            type: nodeType,
            name: newNodeName,
            order: newOrder,
            content: nodeType === 'chapter' ? '✍️ 在此撰写章节细纲...' : '📁 文件夹内容描述',
        };
        outlineData.nodes.push(newNode);
        sortNodesByOrder();
        renderTree();
        // 自动选中新节点
        setCurrentSelected(newId);
    }
    
    // 删除节点 (需要递归删除子节点)
    function deleteNodeById(nodeId) {
        if(nodeId === 'outline_root') {
            alert('总纲不可删除，请编辑内容');
            return false;
        }
        if(nodeId === 'volumes_root') {
            alert('卷章集根目录不可删除');
            return false;
        }
        const node = outlineData.nodes.find(n => n.id === nodeId);
        if(!node) return false;
        // 递归找出所有子节点删除
        const toDeleteIds = [nodeId];
        function collectChildren(pid) {
            const children = outlineData.nodes.filter(n => n.parentId === pid);
            children.forEach(child => {
                toDeleteIds.push(child.id);
                collectChildren(child.id);
            });
        }
        collectChildren(nodeId);
        outlineData.nodes = outlineData.nodes.filter(n => !toDeleteIds.includes(n.id));
        // 如果当前删除的正好是选中项，则跳转到总纲
        if(currentSelectedId === nodeId) {
            setCurrentSelected('outline_root');
        } else {
            renderTree();
            // 但当前选中的没有影响，刷新即可
            renderTree();
            if(currentSelectedId && outlineData.nodes.find(n=>n.id===currentSelectedId)) {
                // 继续高亮
            } else {
                setCurrentSelected('outline_root');
            }
        }
        renderTree();
        return true;
    }
    
    // 保存当前编辑内容到选中的节点
    function saveCurrentNode() {
        if(!currentSelectedId) return;
        const node = outlineData.nodes.find(n => n.id === currentSelectedId);
        if(node) {
            const newTitle = document.getElementById('editorTitleInput').value.trim();
            const newContent = document.getElementById('editorContentArea').value;
            if(newTitle) node.name = newTitle;
            node.content = newContent;
            renderTree(); // 刷新左侧名称
            alert('保存成功 ✓');
        } else {
            alert('节点不存在');
        }
    }
    
    function setCurrentSelected(id) {
        currentSelectedId = id;
        const node = outlineData.nodes.find(n => n.id === id);
        if(node) {
            document.getElementById('editorTitleInput').value = node.name;
            document.getElementById('editorContentArea').value = node.content || '';
        } else {
            document.getElementById('editorTitleInput').value = '未选中节点';
            document.getElementById('editorContentArea').value = '';
        }
        renderTree(); // 刷新高亮
    }
    
    // 增加全局快速新建章纲（默认添加到卷章集根节点下作为同级卷/文件夹，更合理：添加到卷章集）
    function globalAddChapter() {
        const volumesRoot = outlineData.nodes.find(n => n.id === 'volumes_root');
        if(volumesRoot) {
            promptAddChild('volumes_root', '卷章集');
        } else {
            alert('未找到卷章根目录');
        }
    }
    
    // 本地存储功能 (保存大纲到localStorage)
    function saveToLocal() {
        const storeData = {
            nodes: outlineData.nodes,
            nextId: nextId,
            version: '1.0'
        };
        localStorage.setItem('novel_outline_manager', JSON.stringify(storeData));
        alert('大纲已保存至本地 💾');
    }
    
    function loadFromLocal() {
        const raw = localStorage.getItem('novel_outline_manager');
        if(raw) {
            try {
                const saved = JSON.parse(raw);
                if(saved.nodes && Array.isArray(saved.nodes)) {
                    outlineData.nodes = saved.nodes;
                    if(saved.nextId) nextId = saved.nextId;
                    // 确保必要根节点存在
                    if(!outlineData.nodes.find(n=>n.id==='outline_root')) {
                        outlineData.nodes.push({ id: "outline_root", parentId: null, type: "folder", name: "总纲", order: 0, isMainOutline: true, content: "小说总纲" });
                    }
                    if(!outlineData.nodes.find(n=>n.id==='volumes_root')) {
                        outlineData.nodes.push({ id: "volumes_root", parentId: null, type: "folder", name: "📚 卷章集", order: 1, isMainOutline: false, content: "" });
                    }
                    sortNodesByOrder();
                    renderTree();
                    setCurrentSelected(currentSelectedId);
                    alert('已加载本地草稿');
                    return;
                }
            } catch(e) { console.warn(e); }
        }
        // 无存储则使用默认示例
        initData();
        renderTree();
        setCurrentSelected('outline_root');
    }
    
    // 绑定UI按钮
    function bindUI() {
        document.getElementById('saveCurrentBtn').addEventListener('click', () => saveCurrentNode());
        document.getElementById('deleteCurrentBtn').addEventListener('click', () => {
            if(currentSelectedId && confirm('确认删除当前选中的大纲/章节? 子内容也将一并删除')) {
                deleteNodeById(currentSelectedId);
            } else if(!currentSelectedId) alert('未选中任何条目');
        });
        document.getElementById('globalAddChapterBtn').addEventListener('click', () => globalAddChapter());
        // 增加一个保存存档的按钮在右下角（放footer或者header）
        const saveAllBtn = document.createElement('button');
        saveAllBtn.innerText = '💿 存档至本地';
        saveAllBtn.className = 'tool-btn';
        saveAllBtn.style.position = 'fixed';
        saveAllBtn.style.bottom = '24px';
        saveAllBtn.style.right = '32px';
        saveAllBtn.style.zIndex = '100';
        saveAllBtn.style.background = '#dac9b3';
        saveAllBtn.style.border = 'none';
        saveAllBtn.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
        saveAllBtn.addEventListener('click', () => saveToLocal());
        document.body.appendChild(saveAllBtn);
        
        // 额外加一个重置/恢复示例（可选，安全起见）
        const resetBtn = document.createElement('button');
        resetBtn.innerText = '🔄 重置示例';
        resetBtn.className = 'tool-btn';
        resetBtn.style.position = 'fixed';
        resetBtn.style.bottom = '24px';
        resetBtn.style.right = '140px';
        resetBtn.style.background = '#eee2d4';
        resetBtn.addEventListener('click', () => {
            if(confirm('重置将丢失未保存的修改，恢复默认大纲示例。确定吗？')) {
                // 重置默认数据
                outlineData.nodes = [];
                nextId = 100;
                initData();
                renderTree();
                setCurrentSelected('outline_root');
                alert('已重置为默认示例大纲');
            }
        });
        document.body.appendChild(resetBtn);
    }
    
    // 启动
    loadFromLocal();
    bindUI();
</script>
</body>
</html>

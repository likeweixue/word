<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>层级笔记 | 可拖拽文件夹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e9e3d7;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, sans-serif;
            padding: 24px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
            min-height: 650px;
        }

        .app-header {
            background: #fcf9f2;
            padding: 18px 28px;
            border-bottom: 1px solid #ede3d4;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .title-section h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #5c3e25;
        }

        .stats-badge {
            background: #f3ecdf;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
        }

        .main-dashboard {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左侧树状笔记目录 (支持拖拽排序) */
        .notes-sidebar {
            width: 320px;
            background: #faf6ef;
            border-right: 1px solid #e6ddcf;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 12px;
        }

        .tree-container {
            flex: 1;
        }

        .tree-node {
            margin: 2px 0;
            user-select: none;
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 16px;
            cursor: grab;
            background: white;
            border: 1px solid transparent;
            transition: 0.1s;
        }

        .node-header:active {
            cursor: grabbing;
        }

        .node-header.drag-over {
            background: #e8dac8;
            border-color: #bc8f6b;
        }

        .node-header.selected {
            background: #e0d0bd;
            font-weight: 600;
        }

        .node-icon {
            font-size: 1.1rem;
        }

        .node-title {
            flex: 1;
            font-size: 0.9rem;
        }

        .node-actions {
            display: flex;
            gap: 6px;
            opacity: 0.5;
        }

        .node-actions span {
            cursor: pointer;
            font-size: 0.8rem;
        }

        .node-children {
            margin-left: 28px;
            padding-left: 8px;
            border-left: 1px dashed #dcccaa;
            display: none;
        }

        .node-children.open {
            display: block;
        }

        .add-btn {
            margin-top: 16px;
            font-size: 0.7rem;
            background: none;
            border: 1px dashed #c9b692;
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            text-align: center;
        }

        /* 右侧编辑器 */
        .note-editor {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            padding: 28px 32px;
            overflow-y: auto;
        }

        .note-title-input {
            font-size: 1.6rem;
            font-weight: 600;
            border: none;
            background: transparent;
            padding: 8px 0;
            margin-bottom: 16px;
            border-bottom: 2px solid #f0e5d8;
            outline: none;
        }

        .note-content {
            width: 100%;
            min-height: 500px;
            border: 1px solid #ede2d4;
            border-radius: 24px;
            padding: 20px;
            font-family: monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
        }

        .editor-footer {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .editor-footer button {
            background: #f3ecdf;
            border: none;
            border-radius: 32px;
            padding: 6px 20px;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .notes-sidebar { width: 260px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="title-section"><h1>📒 写作帮手-层级笔记</h1><p>文件夹 · 笔记拖拽排序</p></div>
        <div class="stats-badge" id="statsBadge">📄 笔记/文件夹: 0</div>
    </div>
    <div class="main-dashboard">
        <div class="notes-sidebar">
            <div class="tree-container" id="notesTree"></div>
            <button id="newFolderBtn" class="add-btn">📁 新增文件夹</button>
            <button id="newNoteBtn" class="add-btn">📄 新增笔记</button>
            <div style="font-size:0.7rem; margin-top:12px; color:#b08a62;">✨ 拖拽文件夹/笔记可调整层级与顺序</div>
        </div>
        <div class="note-editor">
            <input type="text" id="noteTitle" class="note-title-input" placeholder="笔记标题">
            <textarea id="noteBody" class="note-content" placeholder="书写你的灵感、设定或章节细纲……"></textarea>
            <div class="editor-footer">
                <button id="saveNoteBtn">💾 保存</button>
                <button id="deleteNoteBtn" class="delete-btn">🗑 删除</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 笔记数据结构: 可嵌套，支持文件夹与笔记两种类型
    let notesData = [];  // 每个节点 { id, type, name, content, parentId, order }
    let currentNoteId = null;
    let nextId = 100;
    let draggedNode = null;

    // 示例数据
    function initDemoNotes() {
        if (notesData.length > 0) return;
        notesData = [
            { id: "f1", type: "folder", name: "📂 世界架构", content: "", parentId: null, order: 0 },
            { id: "n1", type: "note", name: "🌍 大陆地理", content: "九州分为五域，中央为中州，东方青木林海……", parentId: "f1", order: 0 },
            { id: "n2", type: "note", name: "⚔️ 力量体系", content: "灵气等级: 炼气、筑基、金丹、元婴……", parentId: "f1", order: 1 },
            { id: "f2", type: "folder", name: "📂 角色卷", content: "", parentId: null, order: 1 },
            { id: "n3", type: "note", name: "叶尘·人物小传", content: "孤儿出身，性格坚毅，背负龙渊血脉。", parentId: "f2", order: 0 },
            { id: "n4", type: "note", name: "雪灵儿·情感线", content: "冰雪宫圣女，与叶尘从相识到患难与共。", parentId: "f2", order: 1 },
            { id: "f3", type: "folder", name: "📂 剧情细纲", content: "", parentId: null, order: 2 },
            { id: "n5", type: "note", name: "第一卷·觉醒", content: "1. 古剑认主 2. 宗门试炼 3. 魔影初现", parentId: "f3", order: 0 }
        ];
        sortChildren();
        renderTree();
        updateStat();
        if (notesData.length) setCurrentNote(notesData.find(n => n.type === 'note')?.id);
    }

    function sortChildren() {
        notesData.sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    function getChildren(parentId) {
        return notesData.filter(n => n.parentId === parentId).sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    function renderTree() {
        const container = document.getElementById('notesTree');
        if (!container) return;
        container.innerHTML = '';
        const roots = notesData.filter(n => n.parentId === null).sort((a, b) => (a.order || 0) - (b.order || 0));
        roots.forEach(root => {
            container.appendChild(createNodeElement(root));
        });
        updateStat();
    }

    function createNodeElement(node) {
        const div = document.createElement('div');
        div.className = 'tree-node';
        div.setAttribute('data-id', node.id);
        div.setAttribute('data-type', node.type);
        div.setAttribute('draggable', 'true');

        const header = document.createElement('div');
        header.className = 'node-header';
        if (currentNoteId === node.id) header.classList.add('selected');
        header.setAttribute('data-id', node.id);

        const iconSpan = document.createElement('span');
        iconSpan.className = 'node-icon';
        iconSpan.innerText = node.type === 'folder' ? '📁' : '📄';

        const titleSpan = document.createElement('span');
        titleSpan.className = 'node-title';
        titleSpan.innerText = node.name;

        const actions = document.createElement('div');
        actions.className = 'node-actions';
        const addChild = document.createElement('span');
        addChild.innerText = '+';
        addChild.title = '在此下新增';
        addChild.addEventListener('click', (e) => {
            e.stopPropagation();
            promptAddChild(node.id);
        });
        actions.appendChild(addChild);
        if (node.type !== 'folder') {
            const delIcon = document.createElement('span');
            delIcon.innerText = '✖';
            delIcon.style.color = '#b15c3a';
            delIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`删除「${node.name}」?`)) deleteNodeById(node.id);
            });
            actions.appendChild(delIcon);
        }

        header.appendChild(iconSpan);
        header.appendChild(titleSpan);
        header.appendChild(actions);

        // 拖拽事件
        header.draggable = true;
        header.addEventListener('dragstart', (e) => {
            draggedNode = { id: node.id, type: node.type };
            e.dataTransfer.setData('text/plain', node.id);
            e.dataTransfer.effectAllowed = 'move';
        });
        header.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            header.classList.add('drag-over');
        });
        header.addEventListener('dragleave', () => {
            header.classList.remove('drag-over');
        });
        header.addEventListener('drop', (e) => {
            e.preventDefault();
            header.classList.remove('drag-over');
            if (!draggedNode) return;
            if (draggedNode.id === node.id) return;
            // 移动节点: 改变 parentId 以及顺序
            const targetNode = node;
            const sourceNode = notesData.find(n => n.id === draggedNode.id);
            if (!sourceNode) return;

            // 检查是否将父节点移动到子节点内 (避免循环)
            if (sourceNode.type === 'folder' && targetNode.type === 'folder') {
                let temp = targetNode;
                let isChild = false;
                while (temp) {
                    if (temp.id === sourceNode.id) { isChild = true; break; }
                    temp = notesData.find(n => n.id === temp.parentId);
                }
                if (isChild) { alert('不能将文件夹移动到自己的子级中'); draggedNode = null; return; }
            }
            // 如果目标是一个文件夹，则source放入其内部成为最后一个子节点; 如果是笔记则移动到同级的前/后（插入到目标之前）
            let oldParentId = sourceNode.parentId;
            let targetParentId = (targetNode.type === 'folder') ? targetNode.id : targetNode.parentId;
            // 不允许将笔记或文件夹移动到自身内部
            if (sourceNode.id === targetParentId) return;
            sourceNode.parentId = targetParentId;
            // 重新计算顺序: 若移动到文件夹，则放在最后；若移动到同级在目标之前
            let siblings = getChildren(targetParentId);
            if (targetNode.type !== 'folder') {
                // 移动到目标笔记的同一层级，并且插入到目标笔记之前
                const targetIndex = siblings.findIndex(c => c.id === targetNode.id);
                siblings = siblings.filter(c => c.id !== sourceNode.id);
                let newOrder = 0;
                siblings.forEach((c, idx) => { if (idx === targetIndex) newOrder = idx; c.order = idx; });
                sourceNode.order = newOrder;
                siblings.splice(targetIndex, 0, sourceNode);
                siblings.forEach((c, idx) => c.order = idx);
            } else {
                // 移动到文件夹内成为最后一个
                sourceNode.order = siblings.length;
                siblings.forEach((c, idx) => c.order = idx);
            }
            sortChildren();
            renderTree();
            draggedNode = null;
            setCurrentNote(sourceNode.type === 'note' ? sourceNode.id : currentNoteId);
        });

        header.addEventListener('click', () => {
            if (node.type === 'folder') {
                // 只展开/折叠，不改变编辑器内容
                const childrenDiv = div.querySelector('.node-children');
                if (childrenDiv) childrenDiv.classList.toggle('open');
            } else {
                setCurrentNote(node.id);
            }
        });
        div.appendChild(header);

        const childrenDiv = document.createElement('div');
        childrenDiv.className = 'node-children open';
        const children = getChildren(node.id);
        children.forEach(child => {
            childrenDiv.appendChild(createNodeElement(child));
        });
        if (children.length === 0 && node.type === 'folder') {
            const emptyHint = document.createElement('div');
            emptyHint.style.fontSize = '0.7rem';
            emptyHint.style.color = '#b29a78';
            emptyHint.style.padding = '4px 0 8px 28px';
            emptyHint.innerText = '空文件夹，点击 + 添加内容';
            childrenDiv.appendChild(emptyHint);
        }
        div.appendChild(childrenDiv);
        return div;
    }

    function promptAddChild(parentId) {
        const type = confirm('添加笔记? (确定:笔记, 取消:文件夹)');
        const nodeType = type ? 'note' : 'folder';
        const name = prompt(`请输入${nodeType === 'note' ? '笔记标题' : '文件夹名称'}`, nodeType === 'note' ? '新笔记' : '新文件夹');
        if (!name) return;
        const children = getChildren(parentId);
        const newId = `n_${Date.now()}_${Math.random()}`;
        notesData.push({
            id: newId,
            type: nodeType,
            name: nodeType === 'folder' ? `📂 ${name}` : `📄 ${name}`,
            content: '',
            parentId: parentId,
            order: children.length
        });
        sortChildren();
        renderTree();
        if (nodeType === 'note') setCurrentNote(newId);
    }

    function deleteNodeById(id) {
        const toDelete = [id];
        const collect = (pid) => {
            notesData.filter(n => n.parentId === pid).forEach(ch => {
                toDelete.push(ch.id);
                collect(ch.id);
            });
        };
        collect(id);
        notesData = notesData.filter(n => !toDelete.includes(n.id));
        if (currentNoteId && toDelete.includes(currentNoteId)) currentNoteId = null;
        renderTree();
        if (currentNoteId === null && notesData.length) {
            const firstNote = notesData.find(n => n.type === 'note');
            if (firstNote) setCurrentNote(firstNote.id);
            else document.getElementById('noteTitle').value = ''; document.getElementById('noteBody').value = '';
        }
        updateStat();
    }

    function setCurrentNote(id) {
        currentNoteId = id;
        const node = notesData.find(n => n.id === id);
        if (node && node.type === 'note') {
            document.getElementById('noteTitle').value = node.name.replace(/^📄 /, '');
            document.getElementById('noteBody').value = node.content || '';
        } else {
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteBody').value = '';
        }
        renderTree(); // 刷新高亮
    }

    function saveCurrentNote() {
        if (!currentNoteId) return alert('请先选择一个笔记');
        const node = notesData.find(n => n.id === currentNoteId);
        if (node && node.type === 'note') {
            const newTitle = document.getElementById('noteTitle').value.trim();
            if (newTitle) node.name = `📄 ${newTitle}`;
            node.content = document.getElementById('noteBody').value;
            renderTree();
            alert('已保存');
        } else alert('当前选中的不是笔记，无法保存内容');
    }

    function deleteCurrentNote() {
        if (!currentNoteId) return;
        if (confirm('删除当前笔记？')) deleteNodeById(currentNoteId);
    }

    function newGlobalFolder() {
        const name = prompt('文件夹名称:', '新文件夹');
        if (!name) return;
        const newId = `f_${Date.now()}`;
        const roots = notesData.filter(n => n.parentId === null);
        notesData.push({ id: newId, type: 'folder', name: `📂 ${name}`, content: '', parentId: null, order: roots.length });
        sortChildren(); renderTree();
    }

    function newGlobalNote() {
        const name = prompt('笔记标题:', '新笔记');
        if (!name) return;
        const roots = notesData.filter(n => n.parentId === null);
        const newId = `n_${Date.now()}`;
        notesData.push({ id: newId, type: 'note', name: `📄 ${name}`, content: '', parentId: null, order: roots.length });
        sortChildren(); renderTree();
        setCurrentNote(newId);
    }

    function updateStat() {
        const noteCount = notesData.filter(n => n.type === 'note').length;
        document.getElementById('statsBadge').innerHTML = `📄 笔记/文件夹: ${notesData.length} (笔记${noteCount})`;
    }

    function saveToLocal() { localStorage.setItem('hierarchy_notes', JSON.stringify(notesData)); alert('笔记已保存至本地'); }
    function loadLocal() {
        const raw = localStorage.getItem('hierarchy_notes');
        if (raw) { notesData = JSON.parse(raw); sortChildren(); renderTree(); if (notesData.length) setCurrentNote(notesData.find(n => n.type === 'note')?.id); }
        else initDemoNotes();
    }

    document.getElementById('saveNoteBtn').addEventListener('click', saveCurrentNote);
    document.getElementById('deleteNoteBtn').addEventListener('click', deleteCurrentNote);
    document.getElementById('newFolderBtn').addEventListener('click', newGlobalFolder);
    document.getElementById('newNoteBtn').addEventListener('click', newGlobalNote);
    let saveAll = document.createElement('button'); saveAll.innerText = '💾 存档至本地'; saveAll.className = 'add-btn'; saveAll.style.position = 'fixed'; saveAll.style.bottom = '24px'; saveAll.style.right = '32px'; saveAll.style.zIndex = '100'; saveAll.addEventListener('click', saveToLocal); document.body.appendChild(saveAll);

    loadLocal();
</script>
</body>
</html>

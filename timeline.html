<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小说时间线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #e9e3d7;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, sans-serif;
            padding: 24px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
            min-height: 650px;
        }
        .app-header {
            background: #fcf9f2;
            padding: 18px 28px;
            border-bottom: 1px solid #ede3d4;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .title-section h1 { font-size: 1.6rem; font-weight: 600; color: #5c3e25; letter-spacing: 2px; }
        .title-section p { font-size: 0.75rem; color: #b48b62; margin-top: 4px; }
        .stats-badge { background: #f3ecdf; border-radius: 40px; padding: 6px 16px; font-size: 0.8rem; color: #9b6e48; }
        .main-dashboard { display: flex; flex: 1; overflow: hidden; }
        /* 左侧树 */
        .sidebar-tree {
            width: 280px;
            background: #faf6ef;
            border-right: 1px solid #e6ddcf;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 12px 20px 16px;
        }
        .tree-nav { flex: 1; }
        .tree-node { margin-bottom: 4px; user-select: none; }
        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.15s;
            color: #4a3a28;
            font-weight: 500;
        }
        .node-header:hover { background: #efe3d4; }
        .node-header.active { background: #e0d0bd; color: #3a281c; font-weight: 600; }
        .folder-icon, .file-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        .node-title { flex: 1; font-size: 0.9rem; }
        .node-children { margin-left: 28px; padding-left: 6px; border-left: 1px dashed #dcccaa; display: none; }
        .node-children.open { display: block; }
        .add-btn {
            margin: 12px 0 8px 0;
            font-size: 0.7rem;
            background: none;
            border: 1px dashed #c9b692;
            border-radius: 40px;
            padding: 4px 12px;
            color: #9b784e;
            cursor: pointer;
            width: fit-content;
        }
        .editor-area {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 32px;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #f0e5d8;
            padding-bottom: 14px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .editor-title { font-size: 1.6rem; font-weight: 600; color: #4d3520; background: transparent; border: none; padding: 4px 0; width: 70%; font-family: inherit; }
        .editor-title:focus { outline: none; border-bottom: 2px solid #dbbd98; }
        .tool-buttons { display: flex; gap: 12px; }
        .tool-btn { background: #faf3ea; border: 1px solid #e2d3c2; border-radius: 32px; padding: 6px 16px; font-size: 0.75rem; cursor: pointer; color: #6f4f2f; }
        .tool-btn.danger { color: #b15c3a; }
        .tool-btn:hover { background: #eddccb; }
        .content-textarea { width: 100%; min-height: 400px; border: 1px solid #ede2d4; border-radius: 24px; padding: 20px; font-family: monospace; font-size: 0.95rem; line-height: 1.6; background: #fffdf9; }
        .timeline-meta { display: flex; gap: 20px; margin-bottom: 16px; background: #fef7ef; padding: 12px 16px; border-radius: 28px; }
        .timeline-meta input { background: white; border: 1px solid #e2d4c4; border-radius: 30px; padding: 6px 14px; font-family: inherit; }
        .footer-note { margin-top: 20px; font-size: 0.7rem; text-align: center; color: #c7ad8a; border-top: 1px solid #f1e8dd; padding-top: 16px; }
        @media (max-width: 700px) { .sidebar-tree { width: 240px; } .editor-title { font-size: 1.3rem; width: 100%; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="title-section"><h1>⏳ 写作帮手-时间线纪年</h1><p>大事记 · 年表 · 情节脉络</p></div>
        <div class="stats-badge" id="statsBadge">📅 事件总数: 0</div>
    </div>
    <div class="main-dashboard">
        <div class="sidebar-tree"><div class="tree-nav" id="treeContainer"></div><div style="padding:8px;"><button id="globalAddEventBtn" class="add-btn">+ 新增纪年事件</button></div></div>
        <div class="editor-area">
            <div class="editor-header"><input type="text" id="editorTitle" class="editor-title" placeholder="事件标题"><div class="tool-buttons"><button id="saveBtn" class="tool-btn">💾 保存</button><button id="deleteBtn" class="tool-btn danger">🗑 删除</button></div></div>
            <div class="timeline-meta"><span>📆 时间/纪元</span><input type="text" id="eventDate" placeholder="例: 炎历三年春 / 前1200年"></div>
            <textarea id="editorContent" class="content-textarea" placeholder="详细描述事件经过、影响、人物关系..."></textarea>
            <div class="footer-note">✨ 左侧树状分组: 按时代/卷宗分类事件，可自定义分组</div>
        </div>
    </div>
</div>
<script>
    let timelineData = { nodes: [] };
    let currentId = null;
    let nextId = 500;
    function initDemo() {
        if(timelineData.nodes.length) return;
        timelineData.nodes = [
            { id: "group_ancient", parentId: null, type: "folder", name: "太古·神魔纪元", order: 0, content: "天地初开，神魔大战，遗留神器。", dateRange: "虚无年代" },
            { id: "event1", parentId: "group_ancient", type: "event", name: "创世之战", order: 0, content: "混沌神与深渊魔激战，星辰碎裂，人族诞生。", eventDate: "混沌元年" },
            { id: "group_middle", parentId: null, type: "folder", name: "中古·王朝崛起", order: 1, content: "凡人王朝兴盛，修仙宗门林立。", dateRange: "约3000年前" },
            { id: "event2", parentId: "group_middle", type: "event", name: "九龙夺嫡", order: 0, content: "九位皇子争夺帝位，天下大乱，最终明帝登基。", eventDate: "太初历210年" },
            { id: "event3", parentId: "group_middle", type: "event", name: "仙门大比", order: 1, content: "七大仙门论道，新任盟主诞生。", eventDate: "太初历225年" },
            { id: "group_near", parentId: null, type: "folder", name: "近代·风云再起", order: 2, content: "主角时代，暗流涌动。", dateRange: "现世50年前" }
        ];
        sortNodes();
        renderTree();
        setCurrent(timelineData.nodes[0]?.id);
        updateStat();
    }
    function sortNodes() { timelineData.nodes.sort((a,b)=>(a.order||0)-(b.order||0)); }
    function getChildren(pid) { return timelineData.nodes.filter(n=>n.parentId===pid).sort((a,b)=>(a.order||0)-(b.order||0)); }
    function renderTree() {
        const container = document.getElementById('treeContainer'); if(!container) return;
        container.innerHTML = '';
        const roots = timelineData.nodes.filter(n=>n.parentId===null).sort((a,b)=>a.order-b.order);
        roots.forEach(root=>{ container.appendChild(createNodeElement(root)); });
        updateStat();
    }
    function createNodeElement(node) {
        const div = document.createElement('div'); div.className='tree-node'; div.dataset.id=node.id;
        const header = document.createElement('div'); header.className='node-header';
        if(currentId===node.id) header.classList.add('active');
        const icon = document.createElement('span'); icon.className='folder-icon';
        icon.innerText = node.type==='folder'?'📂':'⏲️';
        const titleSpan = document.createElement('span'); titleSpan.className='node-title'; titleSpan.innerText=node.name;
        header.appendChild(icon); header.appendChild(titleSpan);
        if(node.type==='folder'){
            const addBtn = document.createElement('span'); addBtn.innerText=' + '; addBtn.style.cursor='pointer'; addBtn.style.marginLeft='auto';
            addBtn.addEventListener('click',(e)=>{ e.stopPropagation(); promptAddChild(node.id,node.name); });
            header.appendChild(addBtn);
        }
        header.addEventListener('click',()=>setCurrent(node.id));
        div.appendChild(header);
        const childrenDiv = document.createElement('div'); childrenDiv.className='node-children open';
        const children = getChildren(node.id);
        children.forEach(ch=>{ childrenDiv.appendChild(createNodeElement(ch)); });
        if(children.length===0 && node.type==='folder'){ let hint=document.createElement('div'); hint.style.cssText='font-size:0.7rem;color:#b29a78;padding:4px 0 8px 28px'; hint.innerText='暂无事件，点击“+”添加'; childrenDiv.appendChild(hint); }
        div.appendChild(childrenDiv);
        return div;
    }
    function promptAddChild(parentId, parentName) {
        let name = prompt(`在「${parentName}」下新增事件名称:`, "新事件");
        if(!name) return;
        let children = getChildren(parentId);
        let newId = `evt_${Date.now()}_${Math.random()}`;
        timelineData.nodes.push({ id: newId, parentId: parentId, type: "event", name: name, order: children.length, content: "", eventDate: "待定" });
        sortNodes(); renderTree(); setCurrent(newId);
    }
    function setCurrent(id) {
        currentId = id;
        const node = timelineData.nodes.find(n=>n.id===id);
        if(node){
            document.getElementById('editorTitle').value = node.name||'';
            document.getElementById('editorContent').value = node.content||'';
            document.getElementById('eventDate').value = node.eventDate||'';
        } else { document.getElementById('editorTitle').value=''; document.getElementById('editorContent').value=''; document.getElementById('eventDate').value=''; }
        renderTree();
    }
    function saveCurrent(){
        if(!currentId) return;
        let node = timelineData.nodes.find(n=>n.id===currentId);
        if(node){
            node.name = document.getElementById('editorTitle').value;
            node.content = document.getElementById('editorContent').value;
            node.eventDate = document.getElementById('eventDate').value;
            renderTree();
            alert('已保存');
        }
    }
    function deleteCurrent(){
        if(!currentId) return;
        let node = timelineData.nodes.find(n=>n.id===currentId);
        if(node && node.type==='folder' && (node.id==='group_ancient'||node.id==='group_middle')){ alert('示例分组可删除，但谨慎'); }
        const toDelete = [currentId];
        const collect=(pid)=>{ timelineData.nodes.filter(n=>n.parentId===pid).forEach(ch=>{ toDelete.push(ch.id); collect(ch.id); }); };
        collect(currentId);
        timelineData.nodes = timelineData.nodes.filter(n=>!toDelete.includes(n.id));
        if(currentId && !timelineData.nodes.find(n=>n.id===currentId)) setCurrent(timelineData.nodes[0]?.id);
        else renderTree();
    }
    function globalAddEvent(){
        let group = prompt("添加至哪个分组？输入分组名称(已有:太古·神魔纪元,中古·王朝崛起,近代·风云再起) 或新建分组","近代·风云再起");
        if(!group) return;
        let existGroup = timelineData.nodes.find(n=>n.type==='folder' && n.name===group);
        if(!existGroup){
            let newId = `grp_${Date.now()}`;
            timelineData.nodes.push({ id: newId, parentId: null, type: "folder", name: group, order: timelineData.nodes.filter(n=>!n.parentId).length, content: "", dateRange: "" });
            sortNodes(); renderTree(); existGroup = timelineData.nodes.find(n=>n.id===newId);
        }
        if(existGroup) promptAddChild(existGroup.id, existGroup.name);
    }
    function updateStat(){ document.getElementById('statsBadge').innerHTML = `📅 事件总数: ${timelineData.nodes.filter(n=>n.type==='event').length}`; }
    function saveToLocal(){ localStorage.setItem('timeline_manager', JSON.stringify(timelineData.nodes)); alert('时间线已本地保存'); }
    function loadLocal(){ let raw = localStorage.getItem('timeline_manager'); if(raw){ timelineData.nodes = JSON.parse(raw); sortNodes(); renderTree(); setCurrent(timelineData.nodes[0]?.id); } else initDemo(); }
    document.getElementById('saveBtn').addEventListener('click',saveCurrent);
    document.getElementById('deleteBtn').addEventListener('click',deleteCurrent);
    document.getElementById('globalAddEventBtn').addEventListener('click',globalAddEvent);
    let saveAll=document.createElement('button'); saveAll.innerText='💿 存档至本地'; saveAll.className='tool-btn'; saveAll.style.position='fixed'; saveAll.style.bottom='24px'; saveAll.style.right='32px'; saveAll.style.zIndex='100'; saveAll.addEventListener('click',saveToLocal); document.body.appendChild(saveAll);
    loadLocal();
</script>
</body>
</html>

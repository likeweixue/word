<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写作帮手OpenWrite - 自由的写作软件</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="themes/default.css" id="themeStyle">
</head>
<body>
<div class="app-container">
    <!-- 顶部标签栏 -->
    <div class="tabs-container" id="tabsContainer">
        <div class="tab active" data-tab="home">
            <span class="tab-title">首页</span>
        </div>
        <button class="new-tab-btn" id="newTabBtn">+</button>
    </div>

    <!-- 一级菜单栏 -->
    <div class="main-toolbar" id="mainToolbar">
        <button class="toolbar-btn" data-action="import">导入</button>
        <button class="toolbar-btn" data-action="fullscreen">全屏</button>
        <button class="toolbar-btn" data-action="theme">主题</button>
        <button class="toolbar-btn" data-action="font">字体</button>
        <button class="toolbar-btn" data-action="format">排版</button>
        <button class="toolbar-btn" data-action="find">查找替换</button>
        <button class="toolbar-btn" data-action="proofread">校对</button>
        
        <button class="toolbar-btn" data-action="dual">双栏</button>
        <button class="toolbar-btn" data-action="seclusion">闭关</button>
        
        <button class="toolbar-btn" data-action="memo">备忘录</button>
        <button class="toolbar-btn" data-action="save">保存</button>
        <button class="toolbar-btn" data-action="export">导出</button>
        <button class="toolbar-btn" data-action="sidebar">边栏</button>
    </div>

    <!-- 主内容区 -->
    <div class="main-wrapper">
        <!-- 左侧菜单 -->
        <div class="sidebar-menu" id="sidebarMenu">
            <div class="logo-area">
                <h3>写作帮手OpenWrite</h3>
                <p class="slogan">免费，开源，自由的写作软件</p>
            </div>
            <nav class="menu-nav">
                <button class="menu-item active" data-page="books">书籍</button>
                <button class="menu-item" data-page="stats">数据</button>
                <button class="menu-item" data-page="settings">设置</button>
                <button class="menu-item" data-page="about">关于</button>
                <button class="menu-item" data-page="jianghu">江湖</button>
                <button class="menu-item" data-page="xuefu">学府</button>
            </nav>
            <div class="menu-footer">数据本地存储</div>
        </div>

        <!-- 右侧内容区 -->
        <div class="main-content">
            <div class="pages-container" id="pagesContainer">
                <!-- 首页 - 书籍管理 -->
                <div class="page active" data-page="home">
                    <div class="books-header">
                        <h2>我的书籍</h2>
                        <div class="books-header-buttons">
                            <button id="newGroupBtn" class="btn-secondary">+ 新建分组</button>
                            <button id="newBookBtn" class="btn-primary">+ 新建书籍</button>
                            <button id="trashBtn" class="btn-danger">回收站</button>
                        </div>
                    </div>
                    <div id="booksContainer" class="books-container"></div>
                </div>

                <!-- 数据统计页面 -->
                <div class="page" data-page="stats" style="overflow:auto; padding:0; background:#e9e3d7;">
                    <iframe src="stats.html" style="width:100%; height:100%; border:none; min-height:600px;"></iframe>
                </div>                </div>                            <div class="stat-card"><h3>本周</h3><p class="stat-number" id="weekWords">0</p></div>
                            <div class="stat-card"><h3>本月</h3><p class="stat-number" id="monthWords">0</p></div>
                            <div class="stat-card"><h3>总计</h3><p class="stat-number" id="totalWords">0</p></div>
                        </div>
                    </div>
                </div>

                <!-- 设置页面 -->
                <div class="page" data-page="settings">
                    <div class="settings-container" id="settingsContainer"></div>
                </div>

                <!-- 关于页面 -->
                <div class="page" data-page="about">
                    <div class="about-content">
                        <h2> 写作帮手 OpenWrite</h2>
                        <p>免费，开源，自由的写作软件</p>
                        <p>软件官网openwrite.team</p>
                        <p>版本 0.3.6 发布前瞻版</p>
                        <p>GitHub: <a href="https://github.com/likeweixue/openwrite" target="_blank">https://github.com/likeweixue/openwrite</a></p>
                    </div>
                </div>

                <!-- 江湖页面 -->
                <div class="page" data-page="jianghu"><div id="jianghuContainer"></div>
                </div>

                <!-- 学府页面 -->
                <div class="page" data-page="xuefu">
                    <div id="xuefuContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 新建书籍抽屉 -->
<div id="newBookDrawer" class="drawer">
    <div class="drawer-header">
        <h3>新建书籍</h3>
        <button class="close-drawer" id="closeBookDrawer">✕</button>
    </div>
    <div class="drawer-content">
        <label>书籍名称</label>
        <input type="text" id="newBookName" placeholder="请输入书籍名称">
        <button id="confirmNewBookBtn" class="btn-primary" style="width:100%; margin-top:20px;">创建书籍</button>
    </div>
</div>

<!-- 新建分组抽屉 -->
<div id="newGroupDrawer" class="drawer">
    <div class="drawer-header">
        <h3>新建分组</h3>
        <button class="close-drawer" id="closeGroupDrawer">✕</button>
    </div>
    <div class="drawer-content">
        <label>分组名称</label>
        <input type="text" id="newGroupName" placeholder="请输入分组名称">
        <button id="confirmNewGroupBtn" class="btn-primary" style="width:100%; margin-top:20px;">创建分组</button>
    </div>
</div>

<!-- 闭关面板 -->
<div id="seclusionPanel" class="seclusion-panel" style="display:none;">
    <div class="panel-header">
        <h4>闭关修炼</h4>
        <button class="close-panel" id="closeSeclusionPanel">✕</button>
    </div>
    <div class="panel-content">
        <label>目标字数：</label>
        <input type="number" id="seclusionGoal" value="3000" style="width:100%; padding:8px; margin:8px 0;">
        <label>自动出关时间（小时，0表示不限制）：</label>
        <input type="number" id="seclusionTimeout" value="0" style="width:100%; padding:8px; margin:8px 0;">
        <div id="seclusionProgress" class="seclusion-progress" style="display:none;">
            <div>当前进度：<span id="seclusionCurrent">0</span> / <span id="seclusionGoalDisplay">3000</span> 字</div>
            <div class="seclusion-progress-bar"><div class="seclusion-progress-fill" id="seclusionProgressFill"></div></div>
        </div>
        <button id="startSeclusionBtn" class="btn-primary" style="width:100%; margin-top:12px;">开始闭关</button>
        <button id="stopSeclusionBtn" class="btn-danger" style="width:100%; margin-top:8px; display:none;">结束闭关</button>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/books.js"></script>
<script src="js/settings.js"></script>
<script src="js/jianghu.js"></script>
<script src="js/xuefu.js"></script>
<script src="js/toolbar.js"></script>
<script src="js/app.js"></script>
</body>
</html>
<script>
// 在关于页面添加感谢名单和寄语
setTimeout(function() {
    var aboutPage = document.querySelector('.page[data-page="about"] .about-content');
    if (aboutPage && !document.querySelector('.thanks-list')) {
        var thanksHtml = `
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1);">
                <h3>感谢以下作者</h3>
                <p style="font-size: 14px; line-height: 1.8;">风吹屁屁凉，泽墨川，【女频写手】长兮常相忆，读者读者读者读者读者读者读者读者作者男生，岚音</p>
            </div>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1);">
                <h3>写作帮手寄语</h3>
                <p style="font-size: 14px; line-height: 1.8; text-align: left;">这里借用马克·扎克伯格（Facebook 创始人）的话，想法一开始并不是完美的，没有人一开始就会，都是在做的过程中不断遇到与解决问题，我们要做的是迈出第一步，所以，开始书写故事吧！</p>
            </div>
        `;
        aboutPage.insertAdjacentHTML('beforeend', thanksHtml);
    }
}, 500);
</script>

<!-- 新建书籍右侧滑出面板（新版） -->
<div id="newBookSlidePanelV2" class="right-slide-panel">
    <div class="right-slide-panel-header">
        <h3>新建书籍</h3>
        <button class="right-slide-panel-close" onclick="closeNewBookPanelV2()">✕</button>
    </div>
    <div class="right-slide-panel-content">
        <input type="text" id="newBookNameV2" placeholder="书籍名称" style="width:100%; padding:12px; margin-bottom:16px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
        <textarea id="newBookDescV2" rows="4" placeholder="书籍简介（可选）" style="width:100%; padding:12px; margin-bottom:16px; border:1px solid #ddd; border-radius:8px; resize:vertical; font-size:14px;"></textarea>
        <div style="margin-bottom:16px;">
            <label style="display:block; margin-bottom:8px; font-size:13px; color:#666;">书籍封面（可选）</label>
            <input type="file" id="newBookCoverV2" accept="image/*" style="margin-bottom:8px;">
            <div id="newBookCoverPreviewV2" style="width:100%; height:120px; background:#f5f5f5; border-radius:8px; background-size:cover; background-position:center; border:1px solid #ddd;"></div>
        </div>
        <button id="confirmNewBookBtnV2" class="btn-primary" style="width:100%; padding:12px; font-size:14px;">创建书籍</button>
    </div>
</div>

<!-- 新建分组右侧滑出面板（新版） -->
<div id="newGroupSlidePanelV2" class="right-slide-panel">
    <div class="right-slide-panel-header">
        <h3>新建分组</h3>
        <button class="right-slide-panel-close" onclick="closeNewGroupPanelV2()">✕</button>
    </div>
    <div class="right-slide-panel-content">
        <input type="text" id="newGroupNameV2" placeholder="分组名称" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
        <button id="confirmNewGroupBtnV2" class="btn-primary" style="width:100%; padding:12px; font-size:14px;">创建分组</button>
    </div>
</div>

<script>
// 新建书籍面板函数
function openNewBookPanelV2() {
    document.getElementById('newBookSlidePanelV2').classList.add('open');
    document.getElementById('newBookNameV2').value = '';
    document.getElementById('newBookDescV2').value = '';
    document.getElementById('newBookCoverV2').value = '';
    document.getElementById('newBookCoverPreviewV2').style.backgroundImage = '';
}

function closeNewBookPanelV2() {
    document.getElementById('newBookSlidePanelV2').classList.remove('open');
}

function createNewBookV2() {
    var name = document.getElementById('newBookNameV2').value.trim();
    if (!name) { alert('请输入书籍名称'); return; }
    var desc = document.getElementById('newBookDescV2').value;
    var coverFile = document.getElementById('newBookCoverV2').files[0];
    
    if (coverFile) {
        var reader = new FileReader();
        reader.onload = function(ev) {
            createBookWithData(name, desc, ev.target.result);
        };
        reader.readAsDataURL(coverFile);
    } else {
        createBookWithData(name, desc, null);
    }
}

function createBookWithData(name, desc, cover) {
    var defaultGroup = groups.find(function(g) { return g.name === '默认分组'; });
    var groupId = defaultGroup ? defaultGroup.id : 'default';
    var newChapter = new Chapter(Date.now(), '第一章', '<p></p>');
    var newVolume = new Volume(Date.now(), '第一卷', [newChapter]);
    var newBook = new Book(Date.now(), name, [newVolume]);
    newBook.groupId = groupId;
    newBook.desc = desc || '';
    if (cover) newBook.cover = cover;
    books.push(newBook);
    saveAllData();
    renderBooks();
    closeNewBookPanelV2();
    openBookTab(newBook.id);
    alert('书籍《' + name + '》创建成功');
}

// 新建分组面板函数
function openNewGroupPanelV2() {
    document.getElementById('newGroupSlidePanelV2').classList.add('open');
    document.getElementById('newGroupNameV2').value = '';
}

function closeNewGroupPanelV2() {
    document.getElementById('newGroupSlidePanelV2').classList.remove('open');
}

function createNewGroupV2() {
    var name = document.getElementById('newGroupNameV2').value.trim();
    if (!name) { alert('请输入分组名称'); return; }
    groups.push({ id: Date.now().toString(), name: name });
    saveGroups();
    renderBooks();
    closeNewGroupPanelV2();
    alert('分组"' + name + '"创建成功');
}

// 重新绑定新建书籍和新建分组按钮
document.getElementById('newBookBtn').onclick = openNewBookPanelV2;
document.getElementById('newGroupBtn').onclick = openNewGroupPanelV2;
document.getElementById('confirmNewBookBtnV2').onclick = createNewBookV2;
document.getElementById('confirmNewGroupBtnV2').onclick = createNewGroupV2;

// 封面预览
document.getElementById('newBookCoverV2').onchange = function(e) {
    var file = e.target.files[0];
    if (file) {
        var reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('newBookCoverPreviewV2').style.backgroundImage = 'url(' + ev.target.result + ')';
        };
        reader.readAsDataURL(file);
    }
};
</script>

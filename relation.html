<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>关系图谱 | 人物·势力·关联</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e9e3d7;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'PingFang SC', Roboto, sans-serif;
            padding: 24px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
            min-height: 700px;
        }

        .app-header {
            background: #fcf9f2;
            padding: 18px 28px;
            border-bottom: 1px solid #ede3d4;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .title-section h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #5c3e25;
            letter-spacing: 2px;
        }

        .title-section p {
            font-size: 0.75rem;
            color: #b48b62;
            margin-top: 4px;
        }

        .stats-badge {
            background: #f3ecdf;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            color: #9b6e48;
        }

        .main-dashboard {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* 左侧面板：实体列表（人物/势力） */
        .entity-panel {
            width: 280px;
            background: #faf6ef;
            border-right: 1px solid #e6ddcf;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 12px;
        }

        .entity-section {
            margin-bottom: 24px;
        }

        .entity-section h3 {
            font-size: 0.85rem;
            color: #b45f2b;
            background: #f3ecdf;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-bottom: 12px;
        }

        .entity-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .entity-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e9e2d4;
            cursor: pointer;
            transition: all 0.1s;
        }

        .entity-item:hover {
            background: #f9eedd;
            border-color: #d1b48c;
        }

        .entity-item.selected {
            background: #e0d0bd;
            border-color: #bc8f6b;
            font-weight: 600;
        }

        .entity-name {
            font-size: 0.9rem;
        }

        .entity-type-badge {
            font-size: 0.65rem;
            background: #e8dfd1;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .add-entity-btn {
            margin-top: 12px;
            font-size: 0.7rem;
            background: none;
            border: 1px dashed #c9b692;
            border-radius: 40px;
            padding: 5px 12px;
            color: #9b784e;
            cursor: pointer;
            width: fit-content;
        }

        /* 中间图谱区 */
        .graph-panel {
            flex: 2;
            background: #fefbf5;
            display: flex;
            flex-direction: column;
            padding: 16px;
            position: relative;
        }

        .graph-canvas-container {
            flex: 1;
            background: #fffef7;
            border-radius: 24px;
            border: 1px solid #ede0d0;
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .graph-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            justify-content: center;
        }

        .graph-toolbar button {
            background: #f3ecdf;
            border: none;
            border-radius: 32px;
            padding: 6px 16px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* 右侧编辑区 */
        .relation-editor {
            width: 320px;
            background: #ffffff;
            border-left: 1px solid #ede3d4;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .relation-item {
            background: #fef8f0;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
            border-left: 4px solid #ceb087;
        }

        .relation-text {
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .delete-relation {
            font-size: 0.7rem;
            color: #b15c3a;
            cursor: pointer;
            text-align: right;
        }

        .add-relation-form {
            margin-top: 20px;
            border-top: 1px solid #ede3d4;
            padding-top: 16px;
        }

        .add-relation-form select, .add-relation-form input {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            border-radius: 40px;
            border: 1px solid #ddd0be;
            background: white;
        }

        .form-btn {
            background: #ceb087;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }

        .footer-note {
            font-size: 0.65rem;
            text-align: center;
            color: #c7ad8a;
            margin-top: 16px;
        }

        @media (max-width: 900px) {
            .relation-editor { width: 260px; }
            .entity-panel { width: 240px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="title-section"><h1>🕸️ 墨阁·关系图谱</h1><p>人物·势力·羁绊脉络</p></div>
        <div class="stats-badge" id="statsBadge">⚡ 关系数: 0</div>
    </div>
    <div class="main-dashboard">
        <!-- 左侧实体库 -->
        <div class="entity-panel">
            <div class="entity-section">
                <h3>👥 人物</h3>
                <div class="entity-list" id="characterList"></div>
                <button class="add-entity-btn" id="addCharBtn">+ 新增人物</button>
            </div>
            <div class="entity-section">
                <h3>🏛️ 势力/组织</h3>
                <div class="entity-list" id="factionList"></div>
                <button class="add-entity-btn" id="addFactionBtn">+ 新增势力</button>
            </div>
        </div>

        <!-- 中间图谱 canvas -->
        <div class="graph-panel">
            <div class="graph-toolbar">
                <button id="zoomInBtn">🔍 放大</button>
                <button id="zoomOutBtn">🔍 缩小</button>
                <button id="resetViewBtn">⟳ 重置视图</button>
            </div>
            <div class="graph-canvas-container">
                <canvas id="relationCanvas"></canvas>
            </div>
        </div>

        <!-- 右侧关系编辑 -->
        <div class="relation-editor">
            <h3 style="font-size:1rem; margin-bottom:12px;">📜 关系列表</h3>
            <div id="relationList" style="max-height: 300px; overflow-y: auto;"></div>
            <div class="add-relation-form">
                <h4 style="font-size:0.85rem; margin-bottom:8px;">➕ 新增关系</h4>
                <select id="relSource">
                    <option value="">-- 选择源实体 --</option>
                </select>
                <select id="relTarget">
                    <option value="">-- 选择目标实体 --</option>
                </select>
                <input type="text" id="relDesc" placeholder="关系描述 (如: 师徒 / 盟友 / 敌对)" value="相识">
                <button id="addRelationBtn" class="form-btn">建立联系</button>
            </div>
            <div class="footer-note">💡 点击实体高亮，画布可拖拽/缩放</div>
        </div>
    </div>
</div>

<script>
    // ---------- 数据结构 ----------
    let entities = []; // { id, name, type, x, y }
    let relations = []; // { sourceId, targetId, description }

    let nextEntityId = 10;
    let canvas = null, ctx = null;
    let offsetX = 0, offsetY = 0, scale = 1;
    let isDraggingCanvas = false;
    let dragStart = { x: 0, y: 0 };
    let selectedEntityId = null;

    // 预置示例数据
    function initDemo() {
        if (entities.length) return;
        entities = [
            { id: "char_1", name: "叶尘", type: "character", x: 300, y: 200 },
            { id: "char_2", name: "雪灵儿", type: "character", x: 500, y: 150 },
            { id: "char_3", name: "墨渊", type: "character", x: 450, y: 350 },
            { id: "faction_1", name: "落星宗", type: "faction", x: 150, y: 300 },
            { id: "faction_2", name: "魔渊", type: "faction", x: 600, y: 280 }
        ];
        relations = [
            { sourceId: "char_1", targetId: "char_2", description: "道侣 · 挚爱" },
            { sourceId: "char_1", targetId: "faction_1", description: "核心弟子" },
            { sourceId: "char_2", targetId: "faction_1", description: "盟友门派" },
            { sourceId: "char_3", targetId: "faction_2", description: "君主" },
            { sourceId: "char_1", targetId: "char_3", description: "宿敌" }
        ];
        // 自动布局简单偏移
        entities.forEach((e, idx) => { if (!e.x) e.x = 200 + (idx * 80); if (!e.y) e.y = 200 + (idx % 3) * 80; });
        renderEntityLists();
        drawGraph();
        updateStats();
    }

    function updateStats() {
        document.getElementById('statsBadge').innerHTML = `⚡ 关系数: ${relations.length}`;
        populateSelects();
        renderRelationList();
    }

    function populateSelects() {
        const sourceSel = document.getElementById('relSource');
        const targetSel = document.getElementById('relTarget');
        sourceSel.innerHTML = '<option value="">-- 选择源实体 --</option>';
        targetSel.innerHTML = '<option value="">-- 选择目标实体 --</option>';
        entities.forEach(e => {
            let opt = `<option value="${e.id}">[${e.type === 'character' ? '人' : '势'}] ${e.name}</option>`;
            sourceSel.innerHTML += opt;
            targetSel.innerHTML += opt;
        });
    }

    function renderEntityLists() {
        const charDiv = document.getElementById('characterList');
        const factionDiv = document.getElementById('factionList');
        charDiv.innerHTML = '';
        factionDiv.innerHTML = '';
        entities.forEach(e => {
            const div = document.createElement('div');
            div.className = 'entity-item';
            if (selectedEntityId === e.id) div.classList.add('selected');
            div.innerHTML = `<span class="entity-name">${e.name}</span><span class="entity-type-badge">${e.type === 'character' ? '人物' : '势力'}</span>`;
            div.addEventListener('click', () => { selectedEntityId = e.id; renderEntityLists(); drawGraph(); });
            if (e.type === 'character') charDiv.appendChild(div);
            else factionDiv.appendChild(div);
        });
    }

    function renderRelationList() {
        const container = document.getElementById('relationList');
        if (!container) return;
        container.innerHTML = '';
        relations.forEach((rel, idx) => {
            const source = entities.find(e => e.id === rel.sourceId);
            const target = entities.find(e => e.id === rel.targetId);
            if (!source || !target) return;
            const div = document.createElement('div');
            div.className = 'relation-item';
            div.innerHTML = `
                <div class="relation-text"><strong>${source.name}</strong> → <strong>${target.name}</strong><br>✧ ${rel.description}</div>
                <div class="delete-relation" data-idx="${idx}">🗑 删除</div>
            `;
            div.querySelector('.delete-relation').addEventListener('click', (e) => {
                e.stopPropagation();
                relations.splice(idx, 1);
                updateStats();
                drawGraph();
            });
            container.appendChild(div);
        });
        if (relations.length === 0) container.innerHTML = '<div style="color:#b29a78; text-align:center;">暂无关系，点击左侧新增</div>';
    }

    // 绘图逻辑 (带缩放/拖拽)
    function drawGraph() {
        if (!canvas) return;
        const w = canvas.parentElement.clientWidth;
        const h = canvas.parentElement.clientHeight;
        canvas.width = w;
        canvas.height = h;
        ctx.clearRect(0, 0, w, h);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        // 绘制连线
        relations.forEach(rel => {
            const source = entities.find(e => e.id === rel.sourceId);
            const target = entities.find(e => e.id === rel.targetId);
            if (!source || !target) return;
            ctx.beginPath();
            ctx.moveTo(source.x, source.y);
            ctx.lineTo(target.x, target.y);
            ctx.strokeStyle = '#b48b62';
            ctx.lineWidth = 2 / scale;
            ctx.stroke();
            // 绘制文字标签中点
            const midX = (source.x + target.x) / 2;
            const midY = (source.y + target.y) / 2;
            ctx.font = `${12 / scale}px "Segoe UI"`;
            ctx.fillStyle = '#8b6946';
            ctx.shadowBlur = 0;
            ctx.fillText(rel.description, midX, midY - 5 / scale);
        });
        // 绘制实体
        entities.forEach(e => {
            ctx.beginPath();
            ctx.arc(e.x, e.y, 28 / scale, 0, 2 * Math.PI);
            ctx.fillStyle = e.type === 'character' ? '#f9e0c0' : '#d9cfb0';
            ctx.fill();
            ctx.strokeStyle = selectedEntityId === e.id ? '#d48c54' : '#b48c68';
            ctx.lineWidth = 2.5 / scale;
            ctx.stroke();
            ctx.fillStyle = '#3a2a1c';
            ctx.font = `${14 / scale}px "Segoe UI"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.name, e.x, e.y);
        });
        ctx.restore();
    }

    function handleCanvasMouse(e) {
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        const worldX = (mouseX - offsetX) / scale;
        const worldY = (mouseY - offsetY) / scale;
        if (e.type === 'mousedown' && e.button === 0) {
            // 检测是否点到实体
            let hit = false;
            for (let i = 0; i < entities.length; i++) {
                const ety = entities[i];
                const dx = worldX - ety.x, dy = worldY - ety.y;
                if (Math.hypot(dx, dy) < 28) {
                    selectedEntityId = ety.id;
                    renderEntityLists();
                    drawGraph();
                    hit = true;
                    break;
                }
            }
            if (!hit) {
                isDraggingCanvas = true;
                dragStart.x = e.clientX;
                dragStart.y = e.clientY;
                canvas.style.cursor = 'grabbing';
            }
        } else if (e.type === 'mousemove' && isDraggingCanvas) {
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            offsetX += dx;
            offsetY += dy;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            drawGraph();
        } else if (e.type === 'mouseup') {
            isDraggingCanvas = false;
            canvas.style.cursor = 'grab';
        }
    }

    function addEntity(type) {
        let name = prompt(`请输入${type === 'character' ? '人物' : '势力'}名称:`, type === 'character' ? '新角色' : '新势力');
        if (!name) return;
        const newId = `ent_${Date.now()}_${Math.random()}`;
        const newEntity = {
            id: newId,
            name: name,
            type: type,
            x: 400 + Math.random() * 200,
            y: 250 + Math.random() * 150
        };
        entities.push(newEntity);
        renderEntityLists();
        populateSelects();
        drawGraph();
        updateStats();
    }

    function addRelation() {
        const sourceId = document.getElementById('relSource').value;
        const targetId = document.getElementById('relTarget').value;
        const desc = document.getElementById('relDesc').value.trim();
        if (!sourceId || !targetId) { alert('请选择源和目标实体'); return; }
        if (sourceId === targetId) { alert('不能与自己建立关系'); return; }
        if (relations.some(r => (r.sourceId === sourceId && r.targetId === targetId))) { alert('关系已存在'); return; }
        relations.push({ sourceId, targetId, description: desc || '关联' });
        updateStats();
        drawGraph();
        document.getElementById('relDesc').value = '相识';
    }

    function initCanvasAndEvents() {
        canvas = document.getElementById('relationCanvas');
        ctx = canvas.getContext('2d');
        const container = document.querySelector('.graph-canvas-container');
        const resizeObserver = new ResizeObserver(() => { if (canvas) drawGraph(); });
        if (container) resizeObserver.observe(container);
        window.addEventListener('resize', () => drawGraph());
        canvas.addEventListener('mousedown', handleCanvasMouse);
        window.addEventListener('mousemove', handleCanvasMouse);
        window.addEventListener('mouseup', handleCanvasMouse);
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale = Math.min(2, Math.max(0.4, scale * delta));
            drawGraph();
        });
        canvas.style.cursor = 'grab';
        document.getElementById('zoomInBtn').addEventListener('click', () => { scale = Math.min(2, scale * 1.2); drawGraph(); });
        document.getElementById('zoomOutBtn').addEventListener('click', () => { scale = Math.max(0.4, scale * 0.8); drawGraph(); });
        document.getElementById('resetViewBtn').addEventListener('click', () => { offsetX = 0; offsetY = 0; scale = 1; drawGraph(); });
        drawGraph();
    }

    document.getElementById('addCharBtn').addEventListener('click', () => addEntity('character'));
    document.getElementById('addFactionBtn').addEventListener('click', () => addEntity('faction'));
    document.getElementById('addRelationBtn').addEventListener('click', addRelation);

    initDemo();
    setTimeout(() => {
        initCanvasAndEvents();
        drawGraph();
    }, 100);
</script>
</body>
</html>
